name: Build Windows

on:
  workflow_call:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: Download FFmpeg sidecars (Windows)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
          unzip -j ffmpeg.zip "**/ffmpeg.exe" -d src-tauri/binaries
          unzip -j ffmpeg.zip "**/ffprobe.exe" -d src-tauri/binaries
          mv src-tauri/binaries/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          mv src-tauri/binaries/ffprobe.exe src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Silence Cutter v__VERSION__"
          releaseBody: "See the assets below to download the latest version of Silence Cutter."
          releaseDraft: false
          prerelease: false

      - name: Convert MSI to Store-Compliant MSIX
        shell: powershell
        run: |
          $msiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found MSI: $msiPath"

          # 1. 直接创建最终打包的 stage 目录
          $stageDir = New-Item -ItemType Directory -Path "src-tauri/target/release/bundle/msix_stage" -Force
          $outputDir = "src-tauri/target/release/bundle/msix_out"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          # 2. 【合规修改】直接把 MSI 静默释放到 stage 根目录下，绝对不要破坏和展平它的文件夹结构！
          Write-Host "Extracting MSI content directly to stage directory keeping structures..."
          Start-Process msiexec.exe -ArgumentList "/a `"$msiPath`" /qb TARGETDIR=`"$($stageDir.FullName)`"" -Wait

          # 3. 【合规修改】顺着 Tauri 的 MSI 默认安装路径去定位主 exe。通常它会老老实实在 PFiles/下
          $mainExe = Get-ChildItem -Path $stageDir.FullName -Recurse -Filter "*.exe" | Where-Object { $_.Name -notmatch "unins|msiexec|ffmpeg|ffprobe" } | Select-Object -First 1
          if (-not $mainExe) {
          Write-Error "No main executable found in stage directory"
          exit 1
          }
          # 拿到主程序相对于 stage 根目录的相对路径
          $executableRelativePath = Substring ($mainExe.FullName.Length - $stageDir.FullName.Length - 1)
          Write-Host "Main executable relative path for Manifest: $executableRelativePath"

          # 4. 动态提取版本号和发布者
          $rawVersion = Get-Content -Raw -Path "package.json" | ConvertFrom-Json | Select-Object -ExpandProperty version
          $msixVersion = "$rawVersion.0"
          $publisherCN = "${{ secrets.MICROSOFT_PUBLISHER_CN }}"
          if ([string]::IsNullOrEmpty($publisherCN)) { $publisherCN = "CN=mr_tang_temporary" }

          # 5. 生成清单文件 (把 Manifest 丢在 stage 根目录)
          $manifestPath = Join-Path $stageDir.FullName "AppxManifest.xml"

          # 【关键点】在 Manifest 中，Executable 的值必须指向它真实的深层相对路径！
          $manifestContent = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
           <Identity Name="mrtang.Sliencecutter" Publisher="$publisherCN" Version="$msixVersion" ProcessorArchitecture="x64" />
           <Properties>
            <DisplayName>Silence Cutter</DisplayName>
            <PublisherDisplayName>mr_tang</PublisherDisplayName>
            <!-- 【注意】确保你的图标在解压出来的物理路径中存在，或者在这里使用主程序自带的图标资源 -->
            <Logo>$executableRelativePath</Logo> 
           </Properties>
          <Resources>
          <Resource Language="en-us"/>
          </Resources>
          <Dependencies>
          <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22000.0" />
          </Dependencies>
          <Capabilities>
          <rescap:Capability Name="runFullTrust"/>
          </Capabilities>
          <Applications>
          <Application Id="App" Executable="$executableRelativePath" EntryPoint="Windows.FullTrustApplication">
          <uap:VisualElements DisplayName="Silence Cutter" Description="Silence Cutter" BackgroundColor="transparent" Square150x150Logo="$executableRelativePath" Square44x44Logo="$executableRelativePath">
          </uap:VisualElements>
          </Application>
          </Applications>
          </Package>
          "@
          Set-Content -Path $manifestPath -Value $manifestContent -Encoding UTF8

          # 4. 塞入图标文件夹，防止 Manifest 校验找不到图标报错
          Copy-Item -Path "src-tauri/icons" -Destination (Join-Path $stageDir.FullName "src-tauri/icons") -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Locating makeappx.exe..."
          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.Directory.Name -eq "x64" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) {
            Write-Error "makeappx.exe not found in Windows Kits"
            exit 1
          }
          Write-Host "Found makeappx at: $makeappx"

          # 5. 打包成最终的 MSIX (文件名也通过变量改为动态获取，防止多版本冲突)
          Write-Host "Packaging to MSIX..."
          & $makeappx pack /d $($stageDir.FullName) /p "$outputDir\silence-cutter_${rawVersion}_x64.msix" /o

          Write-Host "Successfully generated MSIX file in $outputDir"

      # 增加一步：动态读取项目版本号（从 package.json）
      - name: Get App Version for Release
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # 明确指定 tag_name 告诉它传到哪里
      - name: Upload MSIX to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ steps.get_version.outputs.tag }}
          artifacts: "src-tauri/target/release/bundle/msix_out/*.msix"
          token: ${{ secrets.GITHUB_TOKEN }}
