name: Build Windows

on:
  workflow_call:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: Download FFmpeg sidecars (Windows)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip -o ffmpeg.zip
          unzip -j ffmpeg.zip "**/ffmpeg.exe" -d src-tauri/binaries
          unzip -j ffmpeg.zip "**/ffprobe.exe" -d src-tauri/binaries
          mv src-tauri/binaries/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          mv src-tauri/binaries/ffprobe.exe src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Silence Cutter v__VERSION__"
          releaseBody: "See the assets below to download the latest version of Silence Cutter."
          releaseDraft: false
          prerelease: false

      - name: Convert MSI to Store-Compliant MSIX
        shell: powershell
        run: |
          $msiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found MSI: $msiPath"

          $stageDir = New-Item -ItemType Directory -Path "src-tauri/target/release/bundle/msix_stage" -Force
          $outputDir = "src-tauri/target/release/bundle/msix_out"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          # 1. 释放 MSI
          Write-Host "Extracting MSI content..."
          Start-Process msiexec.exe -ArgumentList "/a `"$msiPath`" /qb TARGETDIR=`"$($stageDir.FullName)`"" -Wait

          # 2. 【核心修复：干掉 %20 畸形文件夹】
          # 检查是否存在带有 %20 的讨厌文件夹，直接把它重命名为标准空格
          $percentDir = Get-ChildItem -Path "$($stageDir.FullName)\PFiles" -Directory | Where-Object { $_.Name -like "*%20*" } | Select-Object -First 1
          if ($percentDir) {
              Write-Host "Found anomalous %20 directory: $($percentDir.FullName)"
              $cleanName = $percentDir.Name -replace "%20", " "
              Rename-Item -Path $percentDir.FullName -NewName $cleanName -Force
              Write-Host "Successfully renamed to standard space: $cleanName"
          }

          # 3. 定位到洗干净后的程序根目录
          $appDir = Get-ChildItem -Path "$($stageDir.FullName)\PFiles" -Directory | Select-Object -First 1
          Write-Host "Target App Directory inside VFS: $($appDir.FullName)"

          # 4. 【核心修复：物理强制归位 FFmpeg 侧载组件】
          # 既然打包出来丢在了根目录，我们手动在里面帮 Rust 创建标准的 binaries 文件夹，并改好规范的后缀名！
          $binariesDir = New-Item -ItemType Directory -Path (Join-Path $appDir.FullName "binaries") -Force
          
          # 把平铺在根目录的 ffmpeg.exe 挪进去并重命名为标准 Sidecar 格式
          if (Test-Path (Join-Path $appDir.FullName "ffmpeg.exe")) {
              Move-Item -Path (Join-Path $appDir.FullName "ffmpeg.exe") -Destination (Join-Path $binariesDir.FullName "ffmpeg-x86_64-pc-windows-msvc.exe") -Force
              Write-Host "Manually routed ffmpeg to binaries/ with correct target target sidecar name."
          }
          if (Test-Path (Join-Path $appDir.FullName "ffprobe.exe")) {
              Move-Item -Path (Join-Path $appDir.FullName "ffprobe.exe") -Destination (Join-Path $binariesDir.FullName "ffprobe-x86_64-pc-windows-msvc.exe") -Force
              Write-Host "Manually routed ffprobe to binaries/ with correct target target sidecar name."
          }

          # 5. 寻找主程序可执行文件
          $mainExe = Get-ChildItem -Path $appDir.FullName -Filter "silence-cutter.exe" | Select-Object -First 1
          if (-not $mainExe) {
            Write-Error "silence-cutter.exe not found in standard target directory!"
            exit 1
          }
          
          # 计算完美、无畸形的 AppxManifest 相对路径
          $executableRelativePath = $mainExe.FullName.Substring($stageDir.FullName.Length + 1)
          Write-Host "Main executable relative path for Manifest: $executableRelativePath"

          # 6. 动态生成干净的清单文件
          $rawVersion = Get-Content -Raw -Path "package.json" | ConvertFrom-Json | Select-Object -ExpandProperty version
          $msixVersion = "$rawVersion.0"
          $publisherCN = "${{ secrets.MICROSOFT_PUBLISHER_CN }}"
          if ([string]::IsNullOrEmpty($publisherCN)) { $publisherCN = "CN=mr_tang_temporary" }

          Copy-Item -Path "src-tauri/icons" -Destination (Join-Path $stageDir.FullName "src-tauri/icons") -Recurse -Force -ErrorAction SilentlyContinue
          $manifestPath = Join-Path $stageDir.FullName "AppxManifest.xml"

          $manifestContent = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities">
            <Identity Name="mrtang.Sliencecutter" Publisher="$publisherCN" Version="$msixVersion" ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>Silence Cutter</DisplayName>
              <PublisherDisplayName>mr_tang</PublisherDisplayName>
              <Logo>src-tauri\icons\32x32.png</Logo> 
            </Properties>
            <Resources>
              <Resource Language="en-us"/>
            </Resources>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22000.0" />
            </Dependencies>
            <Capabilities>
              <rescap:Capability Name="runFullTrust"/>
            </Capabilities>
            <Applications>
              <Application Id="App" Executable="$executableRelativePath" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="Silence Cutter" Description="Silence Cutter" BackgroundColor="transparent" Square150x150Logo="src-tauri\icons\128x128.png" Square44x44Logo="src-tauri\icons\32x32.png">
                </uap:VisualElements>
              </Application>
            </Applications>
          </Package>
          "@
          Set-Content -Path $manifestPath -Value $manifestContent -Encoding UTF8

          # 7. 找寻编译器打包
          Write-Host "Locating makeappx.exe..."
          $makeappx = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Where-Object { $_.Directory.Name -eq "x64" } | Select-Object -First 1 -ExpandProperty FullName
          
          Write-Host "Packaging to finalized store-compliant MSIX..."
          & $makeappx pack /d $($stageDir.FullName) /p "$outputDir\silence-cutter_${rawVersion}_x64.msix" /o
          Write-Host "Successfully generated healthy MSIX!"

      # 增加一步：动态读取项目版本号（从 package.json）
      - name: Get App Version for Release
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # 明确指定 tag_name 告诉它传到哪里
      - name: Upload MSIX to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ steps.get_version.outputs.tag }}
          artifacts: "src-tauri/target/release/bundle/msix_out/*.msix"
          token: ${{ secrets.GITHUB_TOKEN }}
